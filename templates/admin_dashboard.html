{% extends "admin_base.html" %}

{% block content %}
<div style="margin-bottom: 2rem;">
  <h2 style="font-family: 'Outfit', sans-serif; font-size: 2rem; color: var(--primary);">Dashboard Overview</h2>
  <p style="color: var(--text-muted);">Welcome back, Admin. Here's what's happening at GVP School.</p>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 3rem;">
  
  <div class="admin-card" style="padding: 2rem; border-top: 4px solid var(--accent);">
    <h3 style="color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem;">Admission Inquiries</h3>
    <div style="font-size: 3rem; font-weight: 700; color: var(--primary-brand); font-family: 'Outfit', sans-serif;">{{ inquiries }}</div>
    <a href="{{ url_for('admin_admissions') }}" style="display: inline-block; margin-top: 1rem; color: var(--primary-brand); font-weight: 500; text-decoration: none;">View All &rarr;</a>
  </div>

  <div class="admin-card" style="padding: 2rem; border-top: 4px solid var(--primary-light);">
    <h3 style="color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem;">Contact Messages</h3>
    <div style="font-size: 3rem; font-weight: 700; color: var(--primary-brand); font-family: 'Outfit', sans-serif;">{{ messages }}</div>
    <a href="{{ url_for('admin_contacts') }}" style="display: inline-block; margin-top: 1rem; color: var(--primary-brand); font-weight: 500; text-decoration: none;">View All &rarr;</a>
  </div>

  <div class="admin-card" style="padding: 2rem; border-top: 4px solid var(--primary);">
    <h3 style="color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem;">Gallery Items</h3>
    <div style="font-size: 3rem; font-weight: 700; color: var(--primary-brand); font-family: 'Outfit', sans-serif;">{{ gallery }}</div>
    <a href="{{ url_for('admin_gallery') }}" style="display: inline-block; margin-top: 1rem; color: var(--primary-brand); font-weight: 500; text-decoration: none;">Manage Gallery &rarr;</a>
  </div>

</div>
{% endblock %}
