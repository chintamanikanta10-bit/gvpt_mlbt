{% extends "admin_base.html" %}

{% block content %}
<div class="admin-card" style="max-width: 400px; margin: 4rem auto; padding: 2.5rem;">
  <div style="text-align: center; margin-bottom: 2rem;">
    <h2 style="font-family: 'Outfit', sans-serif; color: var(--primary);">Admin Login</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem;">Please enter your credentials to continue.</p>
  </div>

  <form method="POST" action="{{ url_for('admin_login') }}">
    <div style="margin-bottom: 1.5rem;">
      <label for="username" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username</label>
      <input type="text" id="username" name="username" class="form-input" required>
    </div>
    <div style="margin-bottom: 2rem;">
      <label for="password" style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
      <input type="password" id="password" name="password" class="form-input" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Dashboard</button>
  </form>
</div>
{% endblock %}
